<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="color-scheme" content="dark">
<title>Eleusis FX — Links</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Epilogue:wght@300;400;500&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #020305;
  --surface:   #08090f;
  --surface2:  #0d0f1a;
  --border:    rgba(255,255,255,0.07);
  --border-hi: rgba(255,255,255,0.14);
  --white:     #e8eaf0;
  --muted:     rgba(232,234,240,0.42);
  --accent:    #4f8ef7;
  --accent2:   #7eb3ff;
  --accent-glow: rgba(79,142,247,0.18);
  --green:     #22c55e;
}

html, body {
  min-height: 100%;
  background: var(--bg);
  color: var(--white);
  font-family: 'Epilogue', sans-serif;
  font-weight: 300;
  -webkit-text-size-adjust: 100%;
}

/* subtle grid overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.016) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.016) 1px, transparent 1px);
  background-size: 60px 60px;
  pointer-events: none;
  z-index: 0;
}

/* subtle radial glow behind content */
body::after {
  content: '';
  position: fixed;
  top: -20%;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 600px;
  background: radial-gradient(circle, rgba(79,142,247,0.09) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

.page {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 48px 20px 60px;
}

/* ── HEADER ── */
.header {
  text-align: center;
  margin-bottom: 28px;
}

.logo-ring {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 1.5px solid var(--border-hi);
  background: var(--surface);
  margin-bottom: 16px;
  position: relative;
}

.logo-ring::after {
  content: '';
  position: absolute;
  inset: -4px;
  border-radius: 50%;
  background: var(--accent-glow);
  filter: blur(8px);
  z-index: -1;
}

.logo-letter {
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 28px;
  color: var(--accent);
  letter-spacing: -1px;
}

.brand-name {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 22px;
  letter-spacing: 0.04em;
  color: var(--white);
  line-height: 1;
  margin-bottom: 6px;
}

.brand-name span {
  color: var(--accent);
}

.tagline {
  font-size: 13px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  font-weight: 400;
}

/* ── SOCIAL PROOF BAR ── */
.proof-bar {
  width: 100%;
  max-width: 380px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 32px;
  gap: 4px;
}

.proof-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
}

.proof-value {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: 14px;
  color: var(--accent);
  line-height: 1.2;
}

.proof-label {
  font-size: 10px;
  color: var(--muted);
  text-align: center;
  line-height: 1.3;
}

.proof-divider {
  width: 1px;
  height: 28px;
  background: var(--border-hi);
  flex-shrink: 0;
}

/* ── BUTTONS ── */
.links {
  width: 100%;
  max-width: 380px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  margin-bottom: 36px;
}

.btn {
  display: block;
  width: 100%;
  padding: 17px 22px;
  border-radius: 14px;
  text-decoration: none;
  text-align: center;
  font-family: 'Epilogue', sans-serif;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.01em;
  line-height: 1.3;
  transition: transform 0.18s ease, box-shadow 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  cursor: pointer;
  border: 1.5px solid transparent;
  position: relative;
  overflow: hidden;
}

/* shimmer sweep on primary */
.btn-primary::after {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 60%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.08), transparent);
  transition: left 0.5s ease;
}
.btn-primary:hover::after {
  left: 150%;
}

.btn:active {
  transform: scale(0.97);
}

/* PRIMARY */
.btn-primary {
  background: var(--accent);
  color: #fff;
  font-size: 16px;
  padding: 20px 22px;
  box-shadow: 0 0 32px rgba(79,142,247,0.35), 0 4px 16px rgba(0,0,0,0.4);
  border-color: var(--accent);
}

.btn-primary:hover {
  background: var(--accent2);
  border-color: var(--accent2);
  box-shadow: 0 0 48px rgba(79,142,247,0.5), 0 6px 24px rgba(0,0,0,0.5);
  transform: translateY(-2px);
}

.btn-primary .btn-sub {
  display: block;
  font-size: 11px;
  font-weight: 300;
  opacity: 0.8;
  margin-top: 3px;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* SECONDARY */
.btn-secondary {
  background: var(--surface2);
  color: var(--white);
  border-color: var(--border-hi);
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
}

.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent2);
  background: rgba(79,142,247,0.06);
  box-shadow: 0 0 20px rgba(79,142,247,0.15), 0 4px 16px rgba(0,0,0,0.4);
  transform: translateY(-2px);
}

/* TERTIARY */
.btn-tertiary {
  background: transparent;
  color: var(--muted);
  border-color: var(--border);
}

.btn-tertiary:hover {
  border-color: var(--border-hi);
  color: var(--white);
  transform: translateY(-1px);
}

/* ── TRUST FOOTER ── */
.trust-footer {
  text-align: center;
  font-size: 12px;
  color: var(--muted);
  letter-spacing: 0.06em;
  display: flex;
  align-items: center;
  gap: 8px;
}

.trust-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--green);
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--green);
  animation: pulse 2.5s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* mobile constraints — this IS the mobile design */
@media (max-width: 420px) {
  .page { padding: 36px 16px 50px; }
  .btn-primary { font-size: 15px; padding: 18px 20px; }
}

</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-ring">
      <span class="logo-letter">EFX</span>
    </div>
    <div class="brand-name">Eleusis <span>FX</span></div>
    <div class="tagline">FTMO Prop Firm Specialists</div>
  </div>

  <!-- SOCIAL PROOF BAR -->
  <div class="proof-bar">
    <div class="proof-item">
      <div class="proof-value">700+</div>
      <div class="proof-label">Clients Funded</div>
    </div>
    <div class="proof-divider"></div>
    <div class="proof-item">
      <div class="proof-value">Est. 2019</div>
      <div class="proof-label">Years Active</div>
    </div>
    <div class="proof-divider"></div>
    <div class="proof-item">
      <div class="proof-value">🇬🇧 UK</div>
      <div class="proof-label">Based</div>
    </div>
  </div>

  <!-- CTA BUTTONS -->
  <div class="links">

    <!-- PRIMARY — free guide lead magnet -->
    <a href="https://eleusisfx.uk/#leadmag" class="btn btn-primary">
      📥 Get Free Guide — 5 Fatal Mistakes
      <span class="btn-sub">Most traders fail for these reasons</span>
    </a>

    <!-- SECONDARY — main offer -->
    <a href="https://eleusisfx.uk/#apply" class="btn btn-secondary">
      🏆 Apply for Evaluation Pass — £1,150
    </a>

    <!-- TERTIARY — articles -->
    <a href="https://eleusisfx.uk/#articles" class="btn btn-tertiary">
      📖 Read Our Articles
    </a>

    <!-- TERTIARY — Instagram -->
    <a href="https://instagram.com/eleusisfx" class="btn btn-tertiary">
      📸 Follow on Instagram
    </a>

  </div>

  <!-- TRUST FOOTER -->
  <div class="trust-footer">
    <div class="trust-dot"></div>
    Trusted by 700+ traders globally
  </div>

</div>
</body>
</html>
